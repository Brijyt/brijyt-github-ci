name: Scala build Docker image

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      image-name:
        required: true
        type: string
    outputs:
      artifact-name:
        description: "Name of the artifact containing the saved Docker image"
        value: ${{ jobs.build-image.outputs.artifact-name }}
      local-image:
        description: "Local reference of the built image"
        value: ${{ jobs.build-image.outputs.local-image }}

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.save.outputs.artifact_name }}
      local-image: ${{ steps.save.outputs.local_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with sbt
        run: sbt docker:publishLocal
        env:
          SBT_OPTS: "-Dsbt.log.noformat=true"

      - name: Detect local image and save as artifact
        id: save
        shell: bash
        run: |
          set -euo pipefail
          LOCAL_IMAGE="$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E '${{ inputs.image-name }}' | head -1)"
          if [[ -z "${LOCAL_IMAGE}" ]]; then
            echo "No local sbt image found." >&2
            exit 1
          fi
          echo "Local image: ${LOCAL_IMAGE}"
          docker save "${LOCAL_IMAGE}" -o image.tar
          echo "artifact_name=built-image" >> "$GITHUB_OUTPUT"
          echo "local_image=${LOCAL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: image.tar
