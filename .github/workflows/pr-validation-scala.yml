name: PR validation (Scala)

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: "17"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/build.properties', 'project/**/*.scala') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Check code formatting
        run: sbt scalafmtCheckAll

      - name: Compile
        run: sbt compile

      - name: Compile tests
        run: sbt Test/compile

      - name: Run tests
        run: sbt test

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: target/test-reports/*.xml
          reporter: java-junit
          fail-on-error: true
