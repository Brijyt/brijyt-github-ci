name: Scala test

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the artifact containing target"
        value: ${{ jobs.tests.outputs.artifact-name }}

jobs:
  tests:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.artifact-name.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/build.properties', 'project/**/*.scala') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Compile
        run: sbt compile

      - name: Run tests
        env:
          PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL }}
          PACT_BROKER_USERNAME: ${{ vars.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: sbt test

      - name: Set artifact name
        id: artifact-name
        run: echo "name=target-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Upload target directory
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: target/
          if-no-files-found: error
