name: Python build and push Docker image

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      image-name:
        required: true
        type: string
      free-disk-space:
        required: false
        type: boolean
        default: false
    outputs:
      image-ref:
        description: "First pushed tag, usable for deployment"
        value: ${{ jobs.build-image.outputs.image-ref }}
    secrets:
      scw-secret-key:
        required: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.expose.outputs.image_ref }}
    steps:
      - name: Free disk space (SDKs and APT)
        if: inputs.free-disk-space
        run: |
          echo "Before:"
          df -h
          sudo rm -rf /usr/local/lib/android \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /opt/hostedtoolcache \
                      /usr/local/share/boost
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          echo "After:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Extract version and build number
        id: version
        run: |
          BUILD_NUMBER="${{ github.sha }}"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=no-tag-vxx.xx.xx" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: nologin
          password: ${{ secrets.scw-secret-key }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            APP_BUILD_NUMBER=${{ steps.version.outputs.build_number }}

      - name: Expose image ref
        id: expose
        run: |
          FIRST_TAG=$(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ' | tr -s ' ' | xargs -n1 | head -1)
          echo "image_ref=${FIRST_TAG}" >> "$GITHUB_OUTPUT"
