name: Python build and push Docker image

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      image-name:
        description: "Optional image name; if empty, derived from repo name (without brijyt- prefix)"
        required: false
        type: string
        default: ""
      free-disk-space:
        required: false
        type: boolean
        default: false
    outputs:
      image-ref:
        description: "First pushed tag, usable for deployment"
        value: ${{ jobs.build-image.outputs.image-ref }}
    secrets:
      scw-secret-key:
        required: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.expose.outputs.image_ref }}
    steps:
      - name: Free disk space (SDKs and APT)
        if: inputs.free-disk-space
        run: |
          echo "Before:"
          df -h
          sudo rm -rf /usr/local/lib/android \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /opt/hostedtoolcache \
                      /usr/local/share/boost
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          echo "After:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set image name
        id: set-image-name
        run: |
          if [ -n "${{ inputs.image-name }}" ]; then
            echo "name=${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
          else
            repo_name="${GITHUB_REPOSITORY#*/}"
            echo "name=${repo_name#brijyt-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ steps.set-image-name.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Extract version and build number
        id: version
        run: |
          TESTED_SHA="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SOURCE_SHA="${{ github.event.pull_request.head.sha }}"
          else
            SOURCE_SHA="${TESTED_SHA}"
          fi
          echo "build_number=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "tested_sha=${TESTED_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=no-tag-vxx.xx.xx" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: nologin
          password: ${{ secrets.scw-secret-key }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache: fast on repeat runs. Registry cache: survives GHA 10GB eviction; warm across branches.
          cache-from: |
            type=gha
            type=registry,ref=${{ inputs.registry }}/${{ steps.set-image-name.outputs.name }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ inputs.registry }}/${{ steps.set-image-name.outputs.name }}:buildcache,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            APP_BUILD_NUMBER=${{ steps.version.outputs.build_number }}
            APP_TESTED_SHA=${{ steps.version.outputs.tested_sha }}

      - name: Expose image ref
        id: expose
        run: |
          FIRST_TAG=$(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ' | tr -s ' ' | xargs -n1 | head -1)
          echo "image_ref=${FIRST_TAG}" >> "$GITHUB_OUTPUT"
