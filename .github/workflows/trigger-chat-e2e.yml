name: Trigger Chat E2E

on:
  workflow_call:
    outputs:
      e2e_conclusion:
        description: "E2E run conclusion (success/failure/cancelled/timed_out)"
        value: ${{ jobs.trigger.outputs.e2e_conclusion }}
      e2e_run_url:
        description: "URL of the E2E workflow run"
        value: ${{ jobs.trigger.outputs.e2e_run_url }}
    secrets:
      e2e-dispatch-token:
        required: true

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    outputs:
      e2e_conclusion: ${{ steps.run.outputs.e2e_conclusion }}
      e2e_run_url: ${{ steps.run.outputs.e2e_run_url }}
    steps:
      - name: Checkout trigger script
        uses: actions/checkout@v6
        with:
          repository: brijyt/brijyt-github-ci
          ref: main
          sparse-checkout: .github/scripts/trigger_and_wait_workflow.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Trigger and wait for chat E2E
        id: run
        env:
          GITHUB_TOKEN: ${{ secrets.e2e-dispatch-token }}
          TARGET_REPO: brijyt/brijyt-chat-e2e
          TARGET_WORKFLOW: e2e.yml
          TARGET_REF: main
          INPUTS_JSON: '{"environment": "staging"}'
          TIMEOUT: "3600"
        run: python .github/scripts/trigger_and_wait_workflow.py
