name: Verify deploy
on:
  workflow_call:
    inputs:
      verify-mode:
        description: >
          How to validate /health. Allowed: tested-sha (default) checks .testedSha == github.sha;
          status-up checks .status == "UP" (e.g. Quarkus/Keycloak health).
        required: false
        type: string
        default: "tested-sha"
      health-host-template:
        description: >
          Optional host/base URL template for default verification URLs.
          Supports `{env}` placeholder (dev|staging|prod).
          Example: https://connect-{env}.brijyt.io -> https://connect-dev.brijyt.io/health, etc.
          Ignored when health-slugs-json or health-urls-json are provided.
        required: false
        type: string
        default: ""
      health-slugs-json:
        description: >
          Optional JSON array of URL slugs (strings). For each active environment (dev, staging, prod), probes
          https://{slug}-api-{env}.{brijyt.ai|brijyt.io}/health for every slug (domain follows the same *-api rule as default).
          Example: ["embedding-pdf","embedding-generic"] → embedding-pdf-api-dev.brijyt.io, etc. When non-empty, takes
          precedence over health-urls-json.
        required: false
        type: string
        default: ""
      health-urls-json:
        description: >
          Optional JSON map of environment keys to arrays of base URLs (https host, optional path).
          Keys: dev, staging, prod. Example: {"dev":["https://svc-a-dev.example.io","https://svc-b-dev.example.io"]}.
          Each base gets /health appended unless the URL already ends with /health. When empty, URLs default to
          https://{app}-{env}.{brijyt.ai|brijyt.io} from the repository name (same as before). Ignored when health-slugs-json is set.
        required: false
        type: string
        default: ""
    outputs:
      verified-dev:
        description: "'true' when dev health matched the expected SHA"
        value: ${{ jobs.verify.outputs.verified_dev }}
      verified-staging:
        description: "'true' when staging health matched the expected SHA"
        value: ${{ jobs.verify.outputs.verified_staging }}
      verified-prod:
        description: "'true' when prod health matched the expected SHA"
        value: ${{ jobs.verify.outputs.verified_prod }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      verified_dev: ${{ steps.verify.outputs.verified_dev }}
      verified_staging: ${{ steps.verify.outputs.verified_staging }}
      verified_prod: ${{ steps.verify.outputs.verified_prod }}
    steps:
      - name: Wait for /health per environment
        id: verify
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          WD_ENV: ${{ github.event.inputs.environment }}
          VERIFY_MODE: ${{ inputs.verify-mode }}
          HEALTH_HOST_TEMPLATE: ${{ inputs.health-host-template }}
          HEALTH_SLUGS_JSON: ${{ inputs.health-slugs-json }}
          HEALTH_URLS_JSON: ${{ inputs.health-urls-json }}
        run: |
          set -euo pipefail
          VERIFY_MODE="${VERIFY_MODE:-tested-sha}"
          VERIFY_MODE="${VERIFY_MODE,,}"
          if [[ "${VERIFY_MODE}" != "tested-sha" && "${VERIFY_MODE}" != "status-up" ]]; then
            echo "::error::Invalid verify-mode: ${VERIFY_MODE}. Allowed: tested-sha, status-up"
            exit 1
          fi
          echo "Verify mode: ${VERIFY_MODE}"
          REPO_SHORT="${GITHUB_REPOSITORY#*/}"
          APP_NAME="${REPO_SHORT#brijyt-}"
          # Web apps: *.brijyt.ai — API apps: *.brijyt.io (match repo name after brijyt- prefix)
          if [[ "${REPO_SHORT}" == *-api ]]; then
            BASE_DOMAIN="brijyt.io"
          else
            BASE_DOMAIN="brijyt.ai"
          fi
          echo "Verify /health on *.${BASE_DOMAIN} (repo ${REPO_SHORT})"

          if [[ -n "${HEALTH_SLUGS_JSON// }" ]]; then
            echo "$HEALTH_SLUGS_JSON" | jq -e 'type == "array" and length > 0' >/dev/null || {
              echo "::error::health-slugs-json must be a non-empty JSON array"
              exit 1
            }
            echo "Using caller health-slugs-json (https://{slug}-api-{env}.${BASE_DOMAIN}/health)"
          elif [[ -n "${HEALTH_URLS_JSON// }" ]]; then
            echo "$HEALTH_URLS_JSON" | jq -e . >/dev/null || {
              echo "::error::health-urls-json is not valid JSON"
              exit 1
            }
            echo "Using caller health-urls-json override"
          elif [[ -n "${HEALTH_HOST_TEMPLATE// }" ]]; then
            echo "Using caller health-host-template override"
          fi

          to_health_url() {
            local base="$1"
            base="${base%/}"
            if [[ "$base" == */health ]]; then
              echo "$base"
            else
              echo "${base}/health"
            fi
          }

          health_matches_verify_mode() {
            local body="$1"
            case "${VERIFY_MODE}" in
              tested-sha)
                echo "$body" | jq -e --arg sha "$EXPECTED_SHA" '.testedSha == $sha' >/dev/null 2>&1
                ;;
              status-up)
                echo "$body" | jq -e '.status == "UP"' >/dev/null 2>&1
                ;;
              *)
                echo "::error::Invalid verify-mode: ${VERIFY_MODE}"
                return 2
                ;;
            esac
          }

          health_mismatch_log() {
            local body="$1"
            case "${VERIFY_MODE}" in
              tested-sha)
                echo "$body" | jq -c '{buildNumber,testedSha}' 2>/dev/null || echo "(non-json body)"
                ;;
              status-up)
                echo "$body" | jq -c '{status}' 2>/dev/null || echo "(non-json body)"
                ;;
            esac
          }

          verify_health_endpoint() {
            local label="$1"
            local health_url="$2"
            case "${VERIFY_MODE}" in
              tested-sha)
                echo "Checking ${health_url} (${label}) for testedSha == ${EXPECTED_SHA}"
                ;;
              status-up)
                echo "Checking ${health_url} (${label}) for status == UP"
                ;;
            esac
            local i
            for i in $(seq 1 30); do
              local body
              if body="$(curl -fsS --max-time 30 -H 'Accept: application/json' "${health_url}" 2>/dev/null)"; then
                if health_matches_verify_mode "$body"; then
                  echo "Match on ${label} attempt ${i}"
                  return 0
                fi
                echo "Attempt ${i} (${label}): health OK but verify mismatch ($(health_mismatch_log "$body"))"
              else
                echo "Attempt ${i} (${label}): request failed or non-2xx"
              fi
              sleep 10
            done
            echo "Timed out waiting for deployed revision (${label})"
            return 1
          }

          verify_env_urls() {
            local env_key="$1"
            if [[ -n "${HEALTH_SLUGS_JSON// }" ]]; then
              local slug
              while IFS= read -r slug; do
                [[ -z "${slug}" ]] && continue
                local base="https://${slug}-api-${env_key}.${BASE_DOMAIN}"
                verify_health_endpoint "${env_key}[${slug}]" "$(to_health_url "${base}")" || return 1
              done < <(echo "$HEALTH_SLUGS_JSON" | jq -r '.[]')
              return 0
            fi
            if [[ -n "${HEALTH_URLS_JSON// }" ]] && echo "$HEALTH_URLS_JSON" | jq -e --arg e "$env_key" '(.[$e] | type == "array") and (.[$e] | length > 0)' >/dev/null 2>&1; then
              local idx=0
              local base
              while IFS= read -r base; do
                [[ -z "${base}" ]] && continue
                idx=$((idx + 1))
                verify_health_endpoint "${env_key}[${idx}]" "$(to_health_url "${base}")" || return 1
              done < <(echo "$HEALTH_URLS_JSON" | jq -r --arg e "$env_key" '.[$e][]? // empty')
              return 0
            fi
            if [[ -n "${HEALTH_HOST_TEMPLATE// }" ]]; then
              local base="${HEALTH_HOST_TEMPLATE//\{env\}/${env_key}}"
              verify_health_endpoint "${env_key}" "$(to_health_url "${base}")" || return 1
              return 0
            fi
            verify_health_endpoint "${env_key}" "$(to_health_url "https://${APP_NAME}-${env_key}.${BASE_DOMAIN}")" || return 1
          }

          branch_push_non_tag() {
            [[ "${EVENT_NAME}" == "push" ]] || return 1
            [[ "${REF}" == "refs/heads/main" ]] && return 0
            [[ "${REF}" == refs/heads/feature/* ]] && return 0
            [[ "${REF}" == refs/heads/fix/* ]] && return 0
            return 1
          }

          should_verify_dev() {
            branch_push_non_tag && return 0
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              [[ "${GITHUB_HEAD_REF:-}" != release-please--* ]] && return 0
            fi
            [[ "${EVENT_NAME}" == "workflow_dispatch" && "${WD_ENV:-}" == "dev" ]] && return 0
            return 1
          }

          should_verify_staging() {
            branch_push_non_tag && return 0
            [[ "${EVENT_NAME}" == "push" && "${REF}" =~ ^refs/tags/v ]] && return 0
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              [[ "${GITHUB_HEAD_REF:-}" == release-please--* ]] && return 0
            fi
            [[ "${EVENT_NAME}" == "workflow_dispatch" && "${WD_ENV:-}" == "staging" ]] && return 0
            return 1
          }

          should_verify_prod() {
            # Prod deploy on push is limited to v* tags (tag-first Main CI).
            [[ "${EVENT_NAME}" == "push" && "${REF}" =~ ^refs/tags/v ]] && return 0
            [[ "${EVENT_NAME}" == "workflow_dispatch" && "${WD_ENV:-}" == "prod" ]] && return 0
            return 1
          }

          verified_dev=false
          verified_staging=false
          verified_prod=false

          if should_verify_dev; then
            verify_env_urls dev
            verified_dev=true
          else
            echo "Skip verify dev (not deployed for this event)"
          fi

          if should_verify_staging; then
            verify_env_urls staging
            verified_staging=true
          else
            echo "Skip verify staging (not deployed for this event)"
          fi

          if should_verify_prod; then
            verify_env_urls prod
            verified_prod=true
          else
            echo "Skip verify prod (not deployed for this event)"
          fi

          {
            echo "verified_dev=${verified_dev}"
            echo "verified_staging=${verified_staging}"
            echo "verified_prod=${verified_prod}"
          } >> "${GITHUB_OUTPUT}"
