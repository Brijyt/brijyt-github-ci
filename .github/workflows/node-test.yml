name: Node test

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
      cache:
        description: "Package manager for cache (npm or yarn)"
        required: false
        type: string
        default: "npm"
      run-pact:
        description: "Run Pact consumer tests and upload pacts artifact"
        required: false
        type: boolean
        default: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache }}

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run tests (including Pact when run-pact is true)
        if: inputs.run-pact
        run: npm run test:run

      - name: Upload pacts
        if: inputs.run-pact
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: pacts/
          if-no-files-found: error
