name: Release tag name

# Emits vX.Y.Z when the release bump file changed on this push (HEAD vs HEAD^), for Linear milestone / deploy flows.
on:
  workflow_call:
    inputs:
      bump-file:
        description: "Path to the file that must change for a release (e.g. package.json, version.txt)"
        required: true
        type: string
      version-source:
        description: "node-package-json | plain-semver-file"
        required: true
        type: string
      emit-tag-from-ref:
        description: "When true, output tag from the workflow ref (e.g. push of refs/tags/v1.2.3) and skip bump-file diff"
        required: false
        type: boolean
        default: false
    outputs:
      tag:
        description: "Release tag (e.g. v1.2.3) or empty when bump-file did not change"
        value: ${{ jobs.release_tag_name.outputs.tag }}

jobs:
  release_tag_name:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        if: ${{ !inputs.emit-tag-from-ref }}
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        if: ${{ !inputs.emit-tag-from-ref && inputs.version-source == 'node-package-json' }}
        with:
          node-version: "22"

      - id: version
        env:
          BUMP_FILE: ${{ inputs.bump-file }}
          VERSION_SOURCE: ${{ inputs.version-source }}
          EMIT_FROM_REF: ${{ inputs.emit-tag-from-ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${EMIT_FROM_REF}" == "true" ]]; then
            echo "tag=${REF_NAME}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if ! git diff --name-only HEAD^ HEAD | grep -qx "${BUMP_FILE}"; then
            echo "::notice::No ${BUMP_FILE} change in this push; skipping Linear milestone."
            echo "tag=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          case "${VERSION_SOURCE}" in
            node-package-json)
              echo "tag=v$(node -p "require('./${BUMP_FILE}').version")" >> "${GITHUB_OUTPUT}"
              ;;
            plain-semver-file)
              v="$(tr -d '[:space:]' < "${BUMP_FILE}")"
              echo "tag=v${v}" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "::error::Unknown version-source: ${VERSION_SOURCE}"
              exit 1
              ;;
          esac
