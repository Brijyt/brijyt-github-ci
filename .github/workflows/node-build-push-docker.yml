name: Node build and push Docker image

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      image-name:
        description: "Optional image name; if empty, derived from repo name (without brijyt- prefix)"
        required: false
        type: string
        default: ""
      build-args:
        description: "Optional build-args (multiline)"
        required: false
        type: string
        default: ""
      app-name:
        description: "Optional app name for VITE_APP_VERSION build-arg (e.g. brijyt-chat-web)"
        required: false
        type: string
        default: ""
    outputs:
      image-ref:
        description: "First pushed tag, usable for deployment"
        value: ${{ jobs.build-image.outputs.image-ref }}
    secrets:
      scw-secret-key:
        required: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.expose.outputs.image_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set image name
        id: set-image-name
        run: |
          if [ -n "${{ inputs.image-name }}" ]; then
            echo "name=${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
          else
            repo_name="${GITHUB_REPOSITORY#*/}"
            echo "name=${repo_name#brijyt-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ steps.set-image-name.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Determine app version
        if: inputs.app-name != ''
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "app_version=${{ inputs.app-name }}@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: nologin
          password: ${{ secrets.scw-secret-key }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ inputs.app-name != '' && format('VITE_APP_VERSION={0}', steps.version.outputs.app_version) || inputs.build-args }}

      - name: Expose image ref
        id: expose
        run: |
          FIRST_TAG=$(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ' | tr -s ' ' | xargs -n1 | head -1)
          echo "image_ref=${FIRST_TAG}" >> "$GITHUB_OUTPUT"
