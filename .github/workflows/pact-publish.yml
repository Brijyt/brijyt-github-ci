name: Publish PACT contracts

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name of the artifact containing pacts (pacts directory or target directory)"
        required: true
        type: string
      pacts-source:
        description: "pacts-dir = artifact is pacts/ (Python); target-dir = artifact is target/, pacts in target/pacts (Scala)"
        required: true
        type: string
        default: "pacts-dir"

jobs:
  publish-pacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact (pacts-dir)
        if: inputs.pacts-source == 'pacts-dir'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: pacts

      - name: Download artifact (target-dir)
        if: inputs.pacts-source == 'target-dir'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: target

      - name: Publish PACT contracts (pacts-dir)
        if: inputs.pacts-source == 'pacts-dir'
        env:
          PACT_BROKER_BASE_URL: ${{ vars.PACT_BROKER_URL }}
          PACT_BROKER_USERNAME: ${{ vars.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        run: |
          if [ -d "pacts" ] && [ "$(ls -A pacts 2>/dev/null)" ]; then
            docker run --rm \
              -v "$PWD/pacts:/pacts:ro" \
              -e PACT_BROKER_BASE_URL="$PACT_BROKER_BASE_URL" \
              -e PACT_BROKER_USERNAME="$PACT_BROKER_USERNAME" \
              -e PACT_BROKER_PASSWORD="$PACT_BROKER_PASSWORD" \
              --network host \
              pactfoundation/pact-cli:latest \
              broker publish /pacts \
              --consumer-app-version "${{ github.sha }}" \
              --branch "${{ github.ref_name }}"
          else
            echo "No pact files found to publish"
          fi

      - name: Publish PACT contracts (target-dir)
        if: inputs.pacts-source == 'target-dir'
        env:
          PACT_BROKER_BASE_URL: ${{ vars.PACT_BROKER_URL }}
          PACT_BROKER_USERNAME: ${{ vars.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        run: |
          set -euo pipefail
          pact_json_count=0
          if [ -d "target/pacts" ]; then
            pact_json_count="$(find target/pacts -maxdepth 1 -type f -name '*.json' 2>/dev/null | wc -l | tr -d ' ')"
          fi
          if [ "${pact_json_count}" -gt 0 ]; then
            docker run --rm \
              -v "$PWD/target/pacts:/pacts:ro" \
              -e PACT_BROKER_BASE_URL="$PACT_BROKER_BASE_URL" \
              -e PACT_BROKER_USERNAME="$PACT_BROKER_USERNAME" \
              -e PACT_BROKER_PASSWORD="$PACT_BROKER_PASSWORD" \
              --network host \
              pactfoundation/pact-cli:latest \
              broker publish /pacts \
              --consumer-app-version "${{ github.sha }}" \
              --branch "${{ github.ref_name }}"
          else
            echo "No pact files found to publish (target/pacts missing or has no .json contracts)"
          fi
