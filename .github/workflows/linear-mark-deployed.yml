name: Linear mark deployed
on:
  workflow_call:
    inputs:
      tag-name:
        description: "Release tag (e.g. v1.5.2)"
        required: true
        type: string
    secrets:
      linear-api-key:
        required: true

jobs:
  linear_mark_deployed:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          repository: brijyt/brijyt-github-ci
          ref: main
          path: .ci

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: .ci/package-lock.json

      - run: npm ci
        working-directory: .ci

      - name: Mark milestone issues as Deployed and Done
        env:
          LINEAR_API_KEY: ${{ secrets.linear-api-key }}
          TAG_NAME: ${{ inputs.tag-name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .ci/scripts/linear-mark-deployed.mjs
