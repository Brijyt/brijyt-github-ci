name: Notify failure
on:
  workflow_call:
    inputs:
      needs-json:
        description: "Pass the caller's toJSON(needs) so failed jobs are listed without the Actions API (recommended)."
        required: false
        type: string
    secrets:
      slack-bot-token:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Resolve Linear ticket link suffix
        id: meta
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          LINEAR_ID=""
          for candidate in "${PR_HEAD_REF:-}" "${HEAD_REF:-}" "${REF_NAME:-}"; do
            [[ -n "${candidate}" ]] || continue
            if [[ "${candidate}" =~ (BRI-[0-9]+) ]]; then
              LINEAR_ID="${BASH_REMATCH[1]}"
              break
            fi
          done
          if [[ -z "${LINEAR_ID}" ]]; then
            MSG="${COMMIT_MSG:-}"
            [[ -z "${MSG}" ]] && MSG="${PR_TITLE:-}"
            if [[ "${MSG}" =~ (BRI-[0-9]+) ]]; then
              LINEAR_ID="${BASH_REMATCH[1]}"
            fi
          fi
          LINEAR_SUFFIX=""
          if [[ -n "${LINEAR_ID}" ]]; then
            LINEAR_URL="https://linear.app/brijyt/issue/${LINEAR_ID}"
            LINEAR_SUFFIX=" | <${LINEAR_URL}|${LINEAR_ID}>"
          fi
          printf 'linear_suffix=%s\n' "${LINEAR_SUFFIX}" >> "${GITHUB_OUTPUT}"

      - name: List failed jobs
        id: failures
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NEEDS_JSON: ${{ inputs.needs-json }}
        run: |
          set -euo pipefail
          : > fail-summary.txt

          summarize_from_needs() {
            [[ -n "${NEEDS_JSON:-}" ]] || return 1
            echo "${NEEDS_JSON}" | jq -e 'type == "object"' >/dev/null 2>&1 || return 1
            echo "${NEEDS_JSON}" | jq -r '
              to_entries[]
              | select(.value.result == "failure")
              | ("• *" + .key + "* — `" + .value.result + "`")
            ' > fail-summary.txt
            [[ -s fail-summary.txt ]]
          }

          summarize_from_api() {
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" -o jobs.json 2>/dev/null || return 1
            jq -e '.jobs | length > 0' jobs.json >/dev/null 2>&1 || return 1
            jq -r '
              [.jobs[]
                | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "startup_failure")
                | (
                    ("• *" + .name + "* — `" + .conclusion + "`") as $head
                    | ((.steps // []) | map(select(.conclusion == "failure")) | .[0].name? // "") as $step
                    | $head
                      + (if $step != "" then " — failed step: `" + $step + "`" else "" end)
                      + " <" + .html_url + "|open job>"
                  )
              ]
              | if length == 0 then
                  "_No job with failure/timed_out/startup_failure in API response (see run)._"
                else
                  join("\n")
                end
            ' jobs.json > fail-summary.txt
          }

          if summarize_from_api; then
            exit 0
          fi
          if summarize_from_needs; then
            exit 0
          fi
          {
            echo "_Could not list jobs via the Actions API and no needs-json input was passed._"
            echo "From the caller notify_failure job, pass input needs-json with toJSON(needs) (see brijyt-github-ci README). Optional: permissions actions: read on the caller for API step details."
          } > fail-summary.txt

      - name: Build Slack payload
        shell: bash
        env:
          LINEAR_SUFFIX: ${{ steps.meta.outputs.linear_suffix }}
        run: |
          set -euo pipefail
          jq -n \
            --arg ch "#ci-cd" \
            --arg repo "${{ github.repository }}" \
            --arg ref "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg linear_suffix "${LINEAR_SUFFIX}" \
            --rawfile fails fail-summary.txt \
            '{
              channel: $ch,
              text: (
                "Pipeline failed for *\($repo)* (\($ref) @ `\($sha)`)\n"
                + "<\($run_url)|View run>"
                + $linear_suffix
                + "\n\n*Failed jobs*\n"
                + ($fails | rtrimstr("\n"))
              )
            }' > slack-payload.json

      - name: Notify Slack (pipeline failure)
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.slack-bot-token }}
          payload-file-path: slack-payload.json
