name: Notify failure
on:
  workflow_call:
    secrets:
      slack-bot-token:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Linear ticket link suffix
        id: meta
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          LINEAR_ID=""
          for candidate in "${PR_HEAD_REF:-}" "${HEAD_REF:-}" "${REF_NAME:-}"; do
            [[ -n "${candidate}" ]] || continue
            if [[ "${candidate}" =~ (BRI-[0-9]+) ]]; then
              LINEAR_ID="${BASH_REMATCH[1]}"
              break
            fi
          done
          if [[ -z "${LINEAR_ID}" ]]; then
            MSG="${COMMIT_MSG:-}"
            [[ -z "${MSG}" ]] && MSG="${PR_TITLE:-}"
            if [[ "${MSG}" =~ (BRI-[0-9]+) ]]; then
              LINEAR_ID="${BASH_REMATCH[1]}"
            fi
          fi
          LINEAR_SUFFIX=""
          if [[ -n "${LINEAR_ID}" ]]; then
            LINEAR_URL="https://linear.app/brijyt/issue/${LINEAR_ID}"
            LINEAR_SUFFIX=" | <${LINEAR_URL}|${LINEAR_ID}>"
          fi
          printf 'linear_suffix=%s\n' "${LINEAR_SUFFIX}" >> "${GITHUB_OUTPUT}"

      - name: Notify Slack (pipeline failure)
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.slack-bot-token }}
          payload: |
            channel: "#ci-cd"
            text: "Pipeline failed for *${{ github.repository }}* (${{ github.ref_name }} @ `${{ github.sha }}`)\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>${{ steps.meta.outputs.linear_suffix }}"
